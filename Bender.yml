package:
  name: occamy
  authors:
    - Florian Zaruba <zarubaf@iis.ee.ethz.ch>
    - Fabian Schuiki <fschuiki@iis.ee.ethz.ch>
    - Gianna Paulin <pauling@iis.ee.ethz.ch>
    - Paul Scheffler <paulsc@iis.ee.ethz.ch>
    - Thomas Benz <tbenz@iis.ee.ethz.ch>
    - Tim Fischer <fischeti@iis.ee.ethz.ch>
    - Luca Colagrande <colluca@iis.ee.ethz.ch>
    - Noah Huetter <huettern@ethz.ch>
    - Samuel Riedel <sriedel@iis.ee.ethz.ch>
    - Nils Wistoff <nwistoff@iis.ee.ethz.ch>
    - Luca Bertaccini <lbertaccini@iis.ee.ethz.ch>
    - Matheus Cavalcante <matheusd@iis.ee.ethz.ch>
    - Yunhao Deng <yunhao.deng@kuleuven.be>   # HeMAiA current maintainer
    - Fanchen Kong <fanchen.kong@kuleuven.be> # HeMAiA current maintainer
    - Xiaoling Yi <xiaoling.yi@kuleuven.be>   # SNAX current maintainer

dependencies:
  apb:                        { git:  https://github.com/pulp-platform/apb.git,                         version:   0.2.0 }
  apb_timer:                  { git:  https://github.com/pulp-platform/apb_timer.git,                   rev:     0cbc6cbc26c94b8e3bf27cc058c48ef89ea3d4c3 }
  apb_uart:                   { git:  https://github.com/pulp-platform/apb_uart.git,                    rev:     b6145341df79137ac584c83e9c081f80a7a40440 }
  axi:                        { path: hw/vendor/pulp_platform_axi                                                        }
  axi_tlb:                    { path: hw/vendor/pulp_platform_axi_tlb                                                    }
  clint:                      { git:  https://github.com/pulp-platform/clint.git,                       rev:     v0.1.0  }
  common_cells:               { git:  https://github.com/pulp-platform/common_cells.git,                rev:     v1.28.0 }
  cva6:                       { git:  https://github.com/KULeuven-MICAS/cva6.git,                       rev:     kfc/hemaia-integration}
  ara:                        { git:  https://github.com/KULeuven-MICAS/ara.git,                        rev:     main    }
  opentitan_peripherals:      { path: hw/vendor/pulp_platform_opentitan_peripherals                                      }
  register_interface:         { git:  https://github.com/pulp-platform/register_interface.git,          version: 0.3.8   }
  idma:                       { git:  https://github.com/KULeuven-MICAS/iDMA,                           rev:     master  }
  snitch_cluster:             { git:  https://github.com/wenbo-li-ee/snax_cluster.git,                  rev:     swiglue }
  tech_cells_generic:         { git:  https://github.com/KULeuven-MICAS/tech_cells_generic.git,         version: 0.2.16  }
  cluster_icache:             { git:  https://github.com/KULeuven-MICAS/cluster_icache.git,             rev:     main    }
  hemaia_axi_spi_slave:       { git:  https://github.com/KULeuven-MICAS/hemaia_axi_spi_slave.git,       rev:     main    }
  hemaia_d2d_link:            { git:  https://github.com/KULeuven-MICAS/hemaia_d2d_link.git,            rev:     main    }
  hemaia_clk_rst_controller:  { git:  https://github.com/KULeuven-MICAS/hemaia_clk_rst_controller.git,  rev:     main    }
  floo_noc:                   { git:  https://github.com/KULeuven-MICAS/FlooNoC.git,                    rev:     main    }
  bingo_hw_manager:           { git:  https://github.com/KULeuven-MICAS/bingo_hw_manager.git,           rev:     main    }
  hw_scheduler:                { git:  https://github.com/roundeodo/HW_Scheduler.git,                   rev:     main    }

workspace:
  package_links:
    deps/snitch_cluster: snitch_cluster

export_include_dirs:
  - hw/spm_interface/include

sources:
  - target: all(tech_cells_generic_exclude_tc_sram, prep_syn, print_mem_info)
    files:
      - target/tapeout/tc_sram/tc_sram_print/tc_sram.sv
      - target/tapeout/tc_sram/tc_sram_print/tc_sram_impl.sv
  - target: all(tech_cells_generic_exclude_tc_sram, any(prep_syn_test,synthesis))
    files:
      - /users/micas/shares/project_snax/tapeout_modules/hemaia/tc_sram_impl.sv

  # spm_interface
  - files:
      # Level 1
      - hw/spm_interface/src/spm_interface.sv
      - hw/spm_interface/src/spm_rmw_adapter.sv
      # Level 2
      - hw/spm_interface/src/spm_1p_adv_mem_wrapper.sv
      - hw/spm_interface/src/spm_1p_adv.sv
  - target: simulation
    files:
      - hw/spm_interface/src/spm_test.sv
  - target: test
    files:
      - hw/spm_interface/test/tb_spm_rmw_adapter.sv
      - hw/spm_interface/test/tb_spm_1p_adv.sv

  # cluster wrapper (If the file is added in the snax repo, then it does not needed to be added here)

  - target: snax_minimal_cluster
    files:
      - deps/snitch_cluster/target/snitch_cluster/generated/snax_minimal_cluster_wrapper.sv

  # Targets for the occamy NoC
  - target: occamy_noc
    files:
      - target/rtl/src/floo_quad_mesh_xy_noc_pkg.sv
      - target/rtl/src/floo_quad_mesh_xy_noc.sv
  # hw mailboxes
  - target:
    files:
      - hw/hemaia/hemaia_hw_mailbox/hemaia_axi_lite_mailbox_adapter.sv
      - hw/hemaia/hemaia_hw_mailbox/hemaia_hw_mailbox.sv
  - target:
    files:
      - hw/hemaia/hemaia_hw_manager/axi_lite_to_csr.sv # this interface the host axi lite to the csr interface for the bingo hw manager
  # auto-generated soc
  - target: occamy
    files:
      # soc_ctrl
      - target/rtl/src/soc_ctrl/occamy_soc_reg_pkg.sv
      - target/rtl/src/soc_ctrl/occamy_soc_reg_top.sv
      - target/rtl/src/soc_ctrl/occamy_soc_ctrl.sv
      
      # quad periph
      - target/rtl/src/quad_periph/occamy_quad_periph_reg_pkg.sv
      - target/rtl/src/quad_periph/occamy_quad_periph_reg_top.sv
      - target/rtl/src/quad_periph/occamy_quad_periph.sv
      
      # rv_plic
      - target/rtl/src/rv_plic/rv_plic_reg_pkg.sv
      - target/rtl/src/rv_plic/rv_plic_reg_top.sv
      - target/rtl/src/rv_plic/rv_plic.sv

      # clint
      - target/rtl/src/clint/clint_reg_pkg.sv
      - target/rtl/src/clint/clint_reg_top.sv
      - target/rtl/src/clint/clint.sv

      # occamy
      - target/rtl/src/occamy_pkg.sv
      - target/rtl/src/occamy_quad_ctrl.sv
      - target/rtl/src/occamy_quad.sv
      - target/rtl/src/occamy_soc.sv
      - target/rtl/src/occamy_top.sv
      - target/rtl/src/occamy_cva6.sv

  # HeMAiA bootrom
  - target: all(hemaia, not(any(simulation_hemaia, simulation_hemaia_interposer)))
    files:
      - target/rtl/bootrom/bootrom_chip/bootrom.sv
  
  - target: all(hemaia, any(simulation_hemaia, simulation_hemaia_interposer))
    files:
      - target/rtl/bootrom/bootrom_sim/bootrom.sv

  # target/*_chip
  - target: hemaia
    files:
      - hw/hemaia/hemaia_mem_system/hemaia_xdma.sv
      - hw/hemaia/hemaia_mem_system/hemaia_xdma_wrapper.sv
      - hw/hemaia/hemaia_mem_system/hemaia_mem_system.sv
      - target/rtl/src/occamy_chip.sv
      - target/rtl/src/hemaia.sv

  - target: hemaia_netlist
    files:
      - target/rtl/bootrom/bootrom_netlist_sim/bootrom.v
      - target/tapeout/HeMAiAv2_tapeout/outputs/hemaia_mapped_bootrom_commented.v

  # HeMAiA Mem Chip
  - target: hemaia_mem_chip
    files:
      - hw/hemaia/hemaia_mem_system/hemaia_mem_chip_xdma.sv
      - hw/hemaia/hemaia_mem_system/hemaia_mem_chip_xdma_wrapper.sv
      - hw/hemaia/hemaia_mem_system/hemaia_mem_system_for_mem_chip.sv
      - hw/hemaia/hemaia_mem_system/hemaia_mem_chip.sv

  # Interposer model files (excluded from Verilator simulation)
  - target: simulation_hemaia_interposer_model
    files:
      - target/sim/testharness/interposer/cds_thru.sv
      - target/sim/testharness/interposer/cds_alias.sv
      - target/sim/testharness/interposer/congestion_emulator.sv
      - target/sim/testharness/interposer/half_duplex_bus_emulator.sv
      - target/sim/testharness/interposer/hemaia_io_pad.sv
      - target/sim/testharness/interposer/hemaia_chiplet_interconnect_11x6.sv
      - target/sim/testharness/interposer/hemaia_chiplet_interposer_2x2.sv
      - target/sim/testharness/io_wrapper.sv
    
  # target/sim
  - target: simulation_hemaia
    files:
      - target/sim/testharness/uartdpi/uartdpi.sv
      - target/sim/testharness/dut.sv
      - target/sim/testharness/testharness.sv
